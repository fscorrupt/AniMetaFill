name: Release AniMetaFill

on:
  # Production releases
  release:
    types: [published]

  # Dev branch automatic builds
  push:
    branches:
      - dev

  # Manual builds
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to use for testing (e.g., test-1.0.0)'
        required: true
        default: 'test-1.0.0'
      run_docker:
        description: 'Build Docker Image?'
        type: boolean
        default: true

jobs:
  release:
    name: Build and Push Docker Image
    if: github.event_name != 'workflow_dispatch' || inputs.run_docker == true
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Lowercase repository name
        id: repo_name_lowercase
        run: echo "REPO_NAME_LOWERCASE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Normalize Release Tag (Handle v.X.Y.Z and vX.Y.Z)
        if: github.event_name == 'release'
        id: clean_tag
        run: |
          RAW_TAG=${{ github.ref_name }}
          CLEANED_TAG=$(echo "$RAW_TAG" | sed -E 's/^[vV]\.?//')
          echo "CLEAN_TAG=$CLEANED_TAG" >> $GITHUB_ENV

      - name: Read Base Version from Release.txt
        id: read_version
        run: |
          # Read the version from the file and remove whitespace
          VERSION_FROM_FILE=$(cat Release.txt | tr -d '[:space:]')
          echo "FILE_VERSION=$VERSION_FROM_FILE" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.REPO_NAME_LOWERCASE }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ env.CLEAN_TAG }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.CLEAN_TAG }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},value=${{ env.CLEAN_TAG }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref_name == 'dev' }}
            type=sha,prefix=dev-,enable=${{ github.event_name == 'push' && github.ref_name == 'dev' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.version=${{ env.CLEAN_TAG || format('{0}-dev', env.FILE_VERSION) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.CLEAN_TAG || format('{0}-dev', env.FILE_VERSION) }}
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=dev
          cache-to: type=gha,scope=${{ github.ref_name }},mode=max